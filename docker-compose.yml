services:
  celtics-app:
    build: .
    container_name: celtics-app
    ports:
      - "8080:8080"
    depends_on:
      - h2-db
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=jdbc:h2:tcp://h2-db:1521/./data/celticsdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1

  h2-db:
    image: oscarfonts/h2
    container_name: h2-db
    ports:
      - "1521:1521"
      - "8082:81"
    environment:
      - H2_OPTIONS=-tcpAllowOthers -webAllowOthers