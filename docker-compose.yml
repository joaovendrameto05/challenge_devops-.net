services:
  celtics-app:
    build: .
    container_name: celtics-app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # MUDAMOS DE DefaultConnection PARA OracleConnection
      - ConnectionStrings__OracleConnection=Data Source=db:1521/XE;User Id=system;Password=ClyvoChallenge2026!;
    depends_on:
      - db
    restart: unless-stopped

  db:
    # ALTERAMOS DE H2 PARA ORACLE PARA CASAR COM O CÓDIGO
    image: gvenzl/oracle-xe:latest
    container_name: db
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=ClyvoChallenge2026!
    volumes:
      - oracle_data:/opt/oracle/oradata
    restart: unless-stopped

volumes:
  oracle_data:
    name: celtics_oracle_volume