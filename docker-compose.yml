services:
  db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    environment:
      - ORACLE_PASSWORD=oracle
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    restart: always

  celtics-app:
    build: .
    container_name: celtics-app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=User Id=system;Password=oracle;Data Source=db:1521/XE;
    restart: always

volumes:
  oracle_data:
    name: celtics_oracle_volume