version: '3.8'

services:
  celtics-app:
    build: .
    container_name: celtics-app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - h2-db
    restart: unless-stopped

  h2-db:
    image: oscarfonts/h2
    container_name: h2-db
    ports:
      - "8082:81"      # Console H2
      - "9090:1521"    # Porta TCP para conexão
    volumes:
      - h2_data:/opt/h2-data
    restart: unless-stopped

volumes:
  h2_data:
    name: celtics_h2_volume